[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "almond-axol"
version = "0.1.0"
description = "Almond Axol SDK"
readme = "README.md"
requires-python = ">=3.13"
dependencies = []

[project.scripts]
almond-axol = "almond_axol.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["almond_axol"]

[tool.hatch.build.targets.wheel.force-include]
"almond_axol/script/setup_can.sh" = "almond_axol/script/setup_can.sh"
