[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "almond-axol"
version = "0.1.0"
description = "Almond Axol SDK"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "python-can>=4.0",
]

[project.scripts]
almond-axol = "almond_axol.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["almond_axol"]

